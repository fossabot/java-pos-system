name: Java Spring Boot CI with FOSSA

on:
  push:
    branches: [ main ]

jobs:
  build-test-fossa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la
          find . -name pom.xml

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Give permission to Maven wrapper
        working-directory: Backend
        run: chmod +x mvnw

      - name: Build and test Spring Boot app
        working-directory: Backend
        run: ./mvnw clean verify

      - name: Run FOSSA scan
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          path: Backend
